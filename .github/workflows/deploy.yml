name: Deploy site

on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Always deploy the tip of main: when called from the daily pipeline,
      # the triggering SHA predates the data commit that job just pushed.
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
