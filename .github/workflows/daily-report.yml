name: Daily injury report

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET (5:00 AM during standard time) — after the
    # previous day's Congressional Record is published.
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Roll-call XML is immutable once published; carry the fetch cache
      # between runs so only new votes hit congress.gov servers. Save runs
      # even when the pipeline fails, so partial progress accumulates across
      # retries instead of re-tripping the Clerk's rate limiter from zero.
      - name: Restore vote XML cache
        uses: actions/cache/restore@v4
        with:
          path: data/cache
          key: vote-cache-${{ github.run_id }}
          restore-keys: vote-cache-

      - name: Run data pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: node scripts/run.js

      - name: Save vote XML cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/cache
          key: vote-cache-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config user.name "injury-report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site data/history data/reasons-store.json
          git diff --cached --quiet || git commit -m "Daily report $(date -u +%F)"
          git push

  # Deploy is a separate, reusable workflow: frontend-only pushes deploy on
  # their own without a pipeline run, and this job just chains onto it.
  deploy:
    needs: update
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
