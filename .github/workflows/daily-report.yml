name: Daily injury report

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET (5:00 AM during standard time) — after the
    # previous day's Congressional Record is published.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Roll-call XML is immutable once published; carry the fetch cache
      # between runs so only new votes hit congress.gov servers.
      - name: Restore vote XML cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: vote-cache-${{ github.run_id }}
          restore-keys: vote-cache-

      - name: Run data pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: node scripts/run.js

      - name: Commit updated data
        run: |
          git config user.name "injury-report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data data/history
          git diff --cached --quiet || git commit -m "Daily report $(date -u +%F)"
          git push

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
